<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Virtual Library</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #f5f5f0;
    overflow: hidden;
  }
  .library-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: url('a_web_based_interactive_simulation_mimicking_the_s.png') center/cover no-repeat;
  }
  .student {
    position: absolute;
    width: 60px;
    height: 60px;
    cursor: pointer;
    transition: transform 0.2s;
    animation: subtleMove 3s infinite alternate;
  }
  .student:hover {
    transform: scale(1.1);
  }
  @keyframes subtleMove {
    0% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
    100% { transform: translateY(0); }
  }
  /* Your bench */
  .you {
    position: absolute;
    width: 120px;
    height: 100px;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  /* Laptop screen overlay for blinking cursor */
  .laptop-screen {
    position: absolute;
    width: 60%;
    height: 30%;
    top: 20%;
    left: 20%;
    background: rgba(0,0,0,0.9);
    border-radius: 4px;
    overflow: hidden;
  }
  .cursor {
    display: inline-block;
    width: 6px;
    height: 20px;
    background: lime;
    animation: blink 1s infinite;
    vertical-align: bottom;
  }
  @keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
  }
  .tooltip {
    position: absolute;
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>

<div class="library-container">
  <!-- Other students -->
  <div class="student" style="top: 35%; left: 40%;"></div>
  <div class="student" style="top: 35%; left: 50%;"></div>
  <div class="student" style="top: 35%; left: 60%;"></div>
  <div class="student" style="top: 50%; left: 40%;"></div>
  <div class="student" style="top: 50%; left: 60%;"></div>
  <div class="student" style="top: 65%; left: 45%;"></div>
  <div class="student" style="top: 65%; left: 55%;"></div>

  <!-- Your bench with laptop -->
  <div class="you">
    <img src="your_laptop.png" style="width:100%; height:100%;" alt="Your Bench with Laptop">
    <div class="laptop-screen">
      <span class="cursor"></span>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
  const activities = [
    "Reading a textbook",
    "Typing on a laptop",
    "Taking notes in a notebook",
    "Highlighting pages",
    "Sipping coffee",
    "Reviewing lecture slides",
    "Solving practice problems",
    "Sketching diagrams",
    "Listening to soft music while studying"
  ];

  const students = document.querySelectorAll('.student');
  const tooltip = document.getElementById('tooltip');

  // Assign each student a current activity
  const studentActivities = Array.from(students).map(() => {
    return activities[Math.floor(Math.random() * activities.length)];
  });

  // Function to update activities every 5 seconds
  function updateActivities() {
    students.forEach((student, index) => {
      studentActivities[index] = activities[Math.floor(Math.random() * activities.length)];
    });
  }
  setInterval(updateActivities, 5000);

  // Tooltip on hover shows current activity
  students.forEach((student, index) => {
    student.addEventListener('mouseenter', e => {
      tooltip.textContent = studentActivities[index];
      tooltip.style.opacity = 1;
      tooltip.style.left = e.pageX + 10 + "px";
      tooltip.style.top = e.pageY + 10 + "px";
    });
    student.addEventListener('mousemove', e => {
      tooltip.style.left = e.pageX + 10 + "px";
      tooltip.style.top = e.pageY + 10 + "px";
    });
    student.addEventListener('mouseleave', () => {
      tooltip.style.opacity = 0;
    });
  });
</script>

</body>
</html>
